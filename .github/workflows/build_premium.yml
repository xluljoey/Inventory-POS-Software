name: Build Windows Executable

on:
  push:
    branches:
      - premium-sync
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --add-data "assets;assets" --add-data "ui;ui" --name Inventory_Premium_Sync main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Premium-Windows-Build
          path: dist/Inventory_Premium_Sync.exe# Triggering fresh build after public switch
